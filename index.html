<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mobility">
<title>Mobility System</title>
<style>
:root{
  --bg:#0d0d0d;--s1:#111;--s2:#181818;--s3:#1e1e1e;
  --text:#f0ede8;--muted:#666;--dim:#333;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;
  min-height:100vh;padding-bottom:100px;}

.hdr{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid #1e1e1e;padding:18px 18px 0;}
.eyebrow{font-size:9px;letter-spacing:4px;color:#444;text-transform:uppercase;margin-bottom:3px;}
.ttl{font-size:22px;font-weight:400;letter-spacing:-0.5px;margin-bottom:2px;}
.sub{font-size:11px;color:#444;font-style:italic;margin-bottom:14px;}
.nav{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex:0 0 auto;padding:9px 13px;border:none;border-bottom:2px solid transparent;background:transparent;
  font-family:inherit;font-size:11px;font-weight:400;color:#3a3a3a;cursor:pointer;white-space:nowrap;}
.nb.on{font-weight:700;}

.content{padding:14px 16px 20px;}

.rmeta{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #1a1a1a;}
.rlabel{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.rstats{font-size:11px;color:#555;margin-bottom:6px;}
.rintro{font-size:12px;color:#777;line-height:1.6;font-style:italic;}

.warnbox{display:flex;gap:8px;align-items:flex-start;background:#1a0f0f;border:1px solid #3a2020;
  border-radius:9px;padding:10px 12px;margin-bottom:14px;}
.warnbox .wicon{font-size:14px;flex-shrink:0;margin-top:1px;}
.warnbox .wtext{font-size:11px;color:#d99;line-height:1.6;}
.warnbox .wtext b{color:#fff;}

.card{background:var(--s1);border:1px solid var(--s3);border-radius:9px;padding:12px 13px;margin-bottom:5px;
  cursor:pointer;-webkit-user-select:none;user-select:none;}
.card.open{background:var(--s2);}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-left{flex:1;}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.cnum{font-size:10px;color:#252525;font-weight:600;min-width:16px;}
.cname{font-size:14px;font-weight:600;letter-spacing:-0.2px;}
.ttag{font-size:8px;font-weight:700;letter-spacing:1.5px;padding:2px 5px;border-radius:3px;}
.csets{font-size:11px;font-weight:600;}
.chev{font-size:13px;color:#222;transition:transform 0.2s,color 0.15s;flex-shrink:0;margin-top:2px;}
.card.open .chev{transform:rotate(180deg);color:#555;}

.cbody{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #1e1e1e;}
.card.open .cbody{display:block;}
.ccues{font-size:12px;color:#999;line-height:1.75;margin-bottom:10px;}
.csteps{font-size:12px;color:#aaa;line-height:1.9;margin-bottom:10px;}
.csteps ol{padding-left:18px;}
.csteps li{margin-bottom:6px;}

.cardwarn{display:flex;gap:6px;align-items:flex-start;background:#1a0f0f;border:1px solid #3a2020;
  border-radius:7px;padding:8px 10px;margin-bottom:10px;}
.cardwarn .wtext{font-size:11px;color:#d99;line-height:1.6;}
.cardwarn .wtext b{color:#fff;}

.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;
  background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:14px;margin-bottom:10px;}
.timer-ring{position:relative;width:100px;height:100px;}
.timer-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#1a1a1a;stroke-width:6;}
.ring-fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.5s linear;}
.timer-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:22px;font-weight:400;letter-spacing:-0.5px;font-family:inherit;}
.timer-sublabel{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;}
.timer-btns{display:flex;gap:8px;}
.tbtn{padding:8px 18px;border:1px solid #2a2a2a;border-radius:7px;background:#141414;
  color:var(--text);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.tbtn.primary{border-color:#3a3a3a;}

.reps-box{display:flex;align-items:center;gap:10px;background:#0a0a0a;
  border:1px solid #1a1a1a;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.reps-icon{font-size:18px;color:#555;}
.reps-text{font-size:13px;color:#888;line-height:1.5;}
.reps-bold{color:var(--text);font-weight:600;}

.vlink{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  text-decoration:none;padding:6px 10px;border-radius:6px;background:#141414;border:1px solid #222;color:#e63946;}

.legend-wrap{margin:24px 16px 8px;}
.legend-toggle{display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;background:#111;border:1px solid #1e1e1e;border-radius:9px;cursor:pointer;
  -webkit-user-select:none;user-select:none;}
.legend-toggle-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;}
.legend-toggle-chev{font-size:11px;color:#333;transition:transform 0.2s;}
.legend-toggle.open .legend-toggle-chev{transform:rotate(180deg);}
.legend-body{display:none;padding:10px 12px;background:#0e0e0e;
  border:1px solid #1e1e1e;border-top:none;border-bottom-left-radius:9px;border-bottom-right-radius:9px;}
.legend-body.open{display:flex;flex-wrap:wrap;gap:10px;}
.li{display:flex;align-items:center;gap:4px;}
.ltag{font-size:7px;font-weight:700;padding:2px 4px;border-radius:3px;letter-spacing:1px;}
.ll{font-size:10px;color:#444;}
</style>
</head>

let timers={};

function fmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

function startTimer(key,secs,color){
  if(timers[key]&&timers[key].running){clearInterval(timers[key].interval);timers[key].running=false;renderTimerUI(key,color);return;}
  if(!timers[key])timers[key]={remaining:secs,total:secs,running:false};
  if(timers[key].remaining<=0)timers[key].remaining=secs;
  timers[key].running=true;
  timers[key].interval=setInterval(()=>{
    timers[key].remaining--;
    renderTimerUI(key,color);
    if(timers[key].remaining<=0){clearInterval(timers[key].interval);timers[key].running=false;}
  },1000);
  renderTimerUI(key,color);
}

function resetTimer(key,secs,color){
  if(timers[key])clearInterval(timers[key].interval);
  timers[key]={remaining:secs,total:secs,running:false};
  renderTimerUI(key,color);
}

function renderTimerUI(key,color){
  const wrap=document.getElementById("tw-"+key);
  if(!wrap)return;
  const t=timers[key];
  const pct=t.remaining/t.total;
  const r=44,circ=2*Math.PI*r;
  const isDone=t.remaining<=0;
  const isRunning=t.running;
  wrap.querySelector(".ring-fg").style.strokeDashoffset=circ*(1-pct);
  wrap.querySelector(".ring-fg").style.stroke=isDone?"#2d6a4f":color;
  wrap.querySelector(".timer-display").textContent=isDone?"✓":fmt(t.remaining);
  wrap.querySelector(".timer-display").style.color=isDone?"#2d6a4f":color;
  wrap.querySelector(".tbtn.primary").textContent=isRunning?"Pause":(isDone?"Restart":"Start");
}

function buildTimer(key,secs,color,sides){
  const circ=2*Math.PI*44;
  if(!timers[key])timers[key]={remaining:secs,total:secs,running:false};
  return `<div class="timer-wrap" id="tw-${key}">
    <div class="timer-ring">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="44"/>
        <circle class="ring-fg" cx="50" cy="50" r="44"
          style="stroke:${color};stroke-dasharray:${circ};stroke-dashoffset:0;"/>
      </svg>
      <div class="timer-display" style="color:${color}">${fmt(secs)}</div>
    </div>
    ${sides?`<div class="timer-sublabel">Timer per side</div>`:""}
    <div class="timer-btns">
      <button class="tbtn primary" onclick="startTimer('${key}',${secs},'${color}')">Start</button>
      <button class="tbtn" onclick="resetTimer('${key}',${secs},'${color}')">Reset</button>
    </div>
  </div>`;
}

function buildReps(repsText){
  return `<div class="reps-box"><div class="reps-icon">↻</div>
    <div class="reps-text"><span class="reps-bold">${repsText}</span></div></div>`;
}

function buildCardWarn(text){
  return `<div class="cardwarn"><span>⚠️</span><div class="wtext">${text}</div></div>`;
}

let activeId="daily";

function render(){
  const routine=ROUTINES.find(r=>r.id===activeId);
  document.getElementById("nav").innerHTML=ROUTINES.map(r=>`
    <button class="nb ${r.id===activeId?"on":""}"
      style="${r.id===activeId?`color:${r.color};border-bottom-color:${r.color}`:""}"
      onclick="switchTo('${r.id}')">${r.label}</button>`).join("");

  let html=`<div class="rmeta">
    <div class="rlabel" style="color:${routine.color}">${routine.sublabel}</div>
    <div class="rstats">${routine.duration}</div>
    <div class="rintro">${routine.intro}</div>
  </div>`;

  if(routine.id==="upper"){
    html+=`<div class="warnbox"><span class="wicon">⚠️</span>
      <div class="wtext"><b>Elbow rule:</b> a dull ache or burning sensation during the isometric holds is normal and expected. If you feel anything sharp or stabbing, stop that exercise immediately.</div>
    </div>`;
  }

  routine.exercises.forEach((ex,i)=>{
    const t=TYPE[ex.type];
    const key=`${activeId}-${i}`;
    const timerHTML=ex.timer?buildTimer(key,ex.timer,routine.color,ex.sides||false):"";
    const repsHTML=ex.reps?buildReps(ex.reps):"";
    const warnHTML=ex.warn?buildCardWarn(ex.warn):"";
    const stepsHTML=ex.steps?`<div class="csteps"><ol>${ex.steps.map(s=>`<li>${s}</li>`).join("")}</ol></div>`:"";
    html+=`<div class="card" id="card-${key}" onclick="toggleCard('${key}','${routine.border}')">
      <div class="card-hdr">
        <div class="card-left">
          <div class="card-top">
            <span class="cnum">${String(i+1).padStart(2,"0")}</span>
            <span class="cname">${ex.name}</span>
            <span class="ttag" style="background:${t.bg};color:${t.text}">${t.label}</span>
          </div>
          <div class="csets" style="color:${routine.color}">${ex.sets}</div>
        </div>
        <div class="chev">▾</div>
      </div>
      <div class="cbody">${warnHTML}${timerHTML}${repsHTML}${stepsHTML}
        <a class="vlink" href="${ex.video}" target="_blank" rel="noopener">▶ Watch tutorial</a>
      </div>
    </div>`;
  });

  document.getElementById("content").innerHTML=html;

  routine.exercises.forEach((ex,i)=>{
    const key=`${activeId}-${i}`;
    if(ex.timer)renderTimerUI(key,routine.color);
  });
}

function switchTo(id){activeId=id;render();window.scrollTo(0,0);}

function toggleCard(key,border){
  const card=document.getElementById("card-"+key);
  card.classList.toggle("open");
  card.style.borderColor=card.classList.contains("open")?border:"";
}

function toggleLegend(){
  const t=document.getElementById("legend-toggle");
  const b=document.getElementById("legend-body");
  t.classList.toggle("open");
  b.classList.toggle("open");
}

render();
</script>
</body>
</html>
